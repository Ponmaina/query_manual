    .input::placeholder { color: var(--muted-foreground); }
    .term-btn { background: none; border: none; cursor: pointer; font-size: 0.875rem; text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 1px; text-decoration-color: var(--muted-foreground); color: var(--muted-foreground); transition: color 0.15s, text-decoration-color 0.15s; padding: 0; line-height: 1.5; }
    .term-btn:hover { color: var(--foreground); text-decoration-color: var(--foreground); }
    .term-btn.active { font-weight: 600; color: var(--foreground); text-decoration-color: var(--foreground); }
    .accordion-trigger { width: 100%; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0.5rem; color: var(--foreground); font-size: 0.875rem; transition: background-color 0.1s; border-radius: calc(var(--radius) - 4px); }
    .accordion-trigger:hover { background-color: var(--muted); }
    .breadcrumb-btn { background: none; border: none; cursor: pointer; color: var(--muted-foreground); font-size: 0.875rem; padding: 0; transition: color 0.15s; }
    .breadcrumb-btn:hover { color: var(--foreground); text-decoration: underline; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .tab-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; min-width: 0; transition: all 0.2s; }

  <script>
    const terms = [
      { id:1,  name:"ホームタブ",          meaning:"Power Queryエディターの基本操作が集まったタブ。クエリの読み込み・結合・行列の操作を行う。",                          location:"Power Queryエディター ▶ 上部タブ ホーム",             category:"tab" },
      { id:2,  name:"変換タブ",            meaning:"データの型変更・値の置換・列の分割など既存列を加工する操作が集まったタブ。",                                        location:"Power Queryエディター ▶ 上部タブ 変換",              category:"tab" },
      { id:3,  name:"列の追加タブ",        meaning:"カスタム列・条件列・インデックス列など新しい列を作成する操作が集まったタブ。",                                       location:"Power Queryエディター ▶ 上部タブ 列の追加",          category:"tab" },
      { id:4,  name:"表示タブ",            meaning:"数式バー・クエリ設定・列の品質表示など画面の表示設定を変更するタブ。",                                             location:"Power Queryエディター ▶ 上部タブ 表示",              category:"tab" },
      { id:5,  name:"カスタム列",          meaning:"M言語の数式を使って自由に新しい列を作成する機能。{1..[デザイン数]}のようなリスト生成も可能。",                      location:"列の追加タブ ▶ カスタム列",                          category:"feature" },
      { id:6,  name:"条件列",              meaning:"IF条件で値を分岐させて新しい列を作成する機能。関数を使わずGUI操作のみで設定できる。",                              location:"列の追加タブ ▶ 条件列",                              category:"feature" },
      { id:7,  name:"値の置換",            meaning:"列内の特定の値を別の値に一括置換する機能。削除は空白に置換することで実現する。",                                    location:"変換タブ ▶ 値の置換",                               category:"feature" },
      { id:8,  name:"クエリの結合（マージ）", meaning:"共通のキー列を使って2つのテーブルを横方向に結合する機能。VLOOKUPの強化版。",                                 location:"ホームタブ ▶ クエリの結合（マージ）",                 category:"feature" },
      { id:9,  name:"クエリの追加",        meaning:"同じ列構造を持つ複数のテーブルを縦方向に結合する機能。月別ファイルの統合などに使う。",                              location:"ホームタブ ▶ クエリの追加",                          category:"feature" },
      { id:10, name:"閉じて読み込む",      meaning:"Power Queryでの変換処理をExcelシートに反映させて終了するボタン。",                                                  location:"ホームタブ ▶ 閉じて読み込む",                        category:"action" },
      { id:11, name:"適用したステップ",    meaning:"クエリに加えた処理の履歴一覧。右側パネルに表示され、各ステップを削除・編集できる。",                                location:"Power Queryエディター ▶ 右側パネル",                  category:"basic" },
      { id:12, name:"グループ化",          meaning:"指定した列を基準にデータを集計（合計・平均・件数など）する機能。",                                                    location:"ホームタブ ▶ グループ化",                            category:"feature" },
      { id:13, name:"列のピボット",        meaning:"行データを列に変換する機能。縦型データを横型（クロス集計）形式に変換する。",                                         location:"変換タブ ▶ 列のピボット",                            category:"feature" },
      { id:14, name:"列のピボット解除",    meaning:"横型データを縦型に変換する機能。クロス集計表を分析しやすい縦型形式に戻す。",                                         location:"変換タブ ▶ 列のピボット解除",                        category:"feature" },
      { id:15, name:"インデックス列",      meaning:"連番（1,2,3…）を自動付与する機能。行の識別子や明細IDの作成に使う。",                                                location:"列の追加タブ ▶ インデックス列",                       category:"feature" },
      { id:16, name:"データ型",            meaning:"列の値の種類（整数・小数・テキスト・日付など）を指定する設定。型が違うと計算や並び替えが崩れる。",                    location:"変換タブ ▶ データ型 / 列ヘッダー左のアイコン",        category:"basic" },
      { id:17, name:"フィルター",          meaning:"条件に一致する行だけを表示・除外する機能。列ヘッダーの▼ボタンから操作する。",                                        location:"各列ヘッダー ▶ ▼ボタン",                             category:"action" },
      { id:18, name:"null",                meaning:"値が存在しない（空白）状態を示す。{1..[列名]}などの処理でnullがあるとエラーになる。事前に置換が必要。",             location:"データ内 / 値の置換で対処",                           category:"basic" },
      { id:19, name:"List（リスト）",      meaning:"{1,2,3}のような複数値をひとつのセルに持つデータ型。↕展開ボタンで行に展開できる。",                                  location:"カスタム列で{1..[列名]}を使ったときに表示",           category:"basic" },
      { id:20, name:"展開ボタン（↕）",    meaning:"Listやテーブル型の列を行や列に展開するボタン。列ヘッダー右端に表示される。",                                         location:"対象列のヘッダー右端",                               category:"action" },
      { id:21, name:"左外部結合",          meaning:"マージ時の結合方法。左テーブルの全行を保持しつつ、右テーブルから一致する値を取得する。",                              location:"クエリの結合 ▶ 結合の種類",                           category:"basic" },
      { id:22, name:"複製",                meaning:"既存クエリの処理ステップをそのまままコピーした新しいクエリを作る機能。別データへの流用に使う。",                      location:"左クエリ一覧 ▶ 右クリック ▶ 複製",                   category:"action" },
      { id:23, name:"Text.Select",         meaning:"指定した文字種のみを抽出するM関数。例：Text.Select([列名], {\"ぁ\"..\"ん\"})でひらがなのみ抽出。",                location:"カスタム列 ▶ 数式欄",                                category:"function" },
      { id:24, name:"並べ替え",            meaning:"列ヘッダーをクリックして昇順・降順に並べ替える機能。複数列で連続して適用すると複合ソートになる。",                   location:"列ヘッダー ▶ クリック / 変換タブ ▶ 並べ替え",        category:"action" },
      { id:25, name:"..（範囲演算子）",    meaning:"{1..5}のように「開始値から終了値までの連続したリスト」を生成するM言語の記号。行複製処理のコアとなる。",             location:"カスタム列の数式欄（M言語）",                        category:"function" },
      { id:26, name:"ソース（適用ステップ）", meaning:"クエリの一番上のステップ。データの取得元（テーブルやファイル）を指定している。⚙で変更可能。",                  location:"適用したステップ ▶ 一番上のステップ ▶ ⚙",           category:"basic" },
      { id:27, name:"テーブルまたは範囲から", meaning:"Excelのテーブルや選択範囲をPower Queryに読み込む入口。",                                                         location:"データタブ ▶ テーブルまたは範囲から",                 category:"action" },
      { id:28, name:'#"列名"（エスケープ）', meaning:'【】№などの記号・特殊文字・スペースを含む列名は [列名] ではなく [#"列名"] と書かないとエラーになる。ジェネレーターは自動で判定して出力する。', location:"カスタム列の数式欄 / M言語全般", category:"basic" },
    ];

    const categories = {
      tab:"タブ", feature:"機能", action:"操作", basic:"基本用語", function:"関数・記号"
    };

    let selectedTerm = null;
    let searchQuery = "";

    function renderTerms() {
      const list = document.getElementById("termsList");
      const filtered = searchQuery
        ? terms.filter(t =>
            t.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
            t.meaning.toLowerCase().includes(searchQuery.toLowerCase())
          )
        : terms;
      list.innerHTML = filtered.map(term => `
        <button class="term-btn ${selectedTerm && selectedTerm.id === term.id ? 'active' : ''}" onclick="selectTerm(${term.id})">${escapeHtml(term.name)}</button>
      `).join("");
    }

    function selectTerm(id) {
      selectedTerm = terms.find(t => t.id === id);
      if (!selectedTerm) return;
      document.getElementById("breadcrumbArrow").style.display = "inline-flex";
      document.getElementById("breadcrumbTerm").textContent = categories[selectedTerm.category] + "：" + selectedTerm.name;
      document.getElementById("meaningTitle").textContent = selectedTerm.name;
      document.getElementById("meaningText").textContent = selectedTerm.meaning;
      document.getElementById("meaningLocation").textContent = selectedTerm.location;
      const section = document.getElementById("meaningSection");
      section.style.display = "block";
      const content = document.getElementById("meaningContent");
      const toggle = document.getElementById("meaningToggle");
      content.classList.add("open");
      toggle.classList.add("open");
      renderTerms();
    }

    function clearSelection() {
      selectedTerm = null;
      document.getElementById("breadcrumbArrow").style.display = "none";
      document.getElementById("breadcrumbTerm").textContent = "";
      document.getElementById("meaningSection").style.display = "none";
      renderTerms();
    }

    function toggleAccordion(contentId, triggerEl) {
      const content = document.getElementById(contentId);
      content.classList.toggle("open");
      triggerEl.classList.toggle("open");
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    document.getElementById("searchInput").addEventListener("input", function() {
      searchQuery = this.value;
      renderTerms();
    });

    renderTerms();
  </script>

function StepList({ steps }) {

  const [openQA, setOpenQA] = useState({});

  const phaseList = [...new Set(steps.map(s => s.phase))];
  const filtered = filter === "すべて" ? steps : steps.filter(s => s.phase === filter);
  const toggleQA = (key) => setOpenQA(prev => ({ ...prev, [key]: !prev[key] }));

  return (
    <div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
        {["すべて", ...phaseList].map(p => (
          <button key={p} onClick={() => { setFilter(p); setActiveStep(null); }} style={{
            padding:"6px 14px", borderRadius:20, border:"2px solid",
            borderColor: filter===p ? (phaseColors[p]||"#1e293b") : "#e2e8f0",
            background: filter===p ? (phaseColors[p]||"#1e293b") : "#fff",
            color: filter===p ? "#fff" : "#64748b",
            fontSize:12, cursor:"pointer", fontWeight: filter===p ? "bold" : "normal",
            transition:"all 0.15s", fontFamily:"inherit"
          }}>{p}</button>
        ))}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>
        {filtered.map(step => {
          const isActive = activeStep === step.id;
          return (
            <div key={step.id}>
              <div onClick={() => setActiveStep(isActive ? null : step.id)} style={{
                background:"#fff", borderRadius:12,
                border:"2px solid "+(isActive ? step.phaseColor : "#e2e8f0"),
                padding:"12px 16px", cursor:"pointer", transition:"all 0.15s",
                boxShadow: isActive ? "0 0 0 3px "+step.phaseColor+"22" : "none"
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{
                    width:36, height:36, borderRadius:"50%", flexShrink:0,
                    background: isActive ? step.phaseColor : step.phaseBg,
                    color: isActive ? "#fff" : step.phaseColor,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:14, fontWeight:"bold"
                  }}>{step.id}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                      <span style={{ fontSize:14, fontWeight:"bold", color:"#1e293b" }}>{step.icon} {step.title}</span>
                      <span style={{ background:step.phaseBg, color:step.phaseColor, fontSize:10, fontWeight:"bold", padding:"2px 8px", borderRadius:10 }}>{step.phase}</span>
                      {step.warns.length > 0 && <span style={{ background:"#fef9c3", color:"#854d0e", fontSize:10, padding:"2px 8px", borderRadius:10 }}>⚠️ 注意あり</span>}
                      {step.qa.length > 0 && <span style={{ background:"#f0fdf4", color:"#166534", fontSize:10, padding:"2px 8px", borderRadius:10 }}>💬 Q&A</span>}
                    </div>
                    <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>{step.desc}</div>
                  </div>
                  <div style={{ color:"#94a3b8", fontSize:16, transform: isActive ? "rotate(90deg)" : "rotate(0deg)", transition:"transform 0.2s" }}>▶</div>
                </div>
              </div>
              {isActive && (
                <div style={{ background:step.phaseBg, border:"2px solid "+step.phaseColor, borderTop:"none", borderRadius:"0 0 12px 12px", padding:16, animation:"fadeIn 0.2s ease" }}>
                  <div style={{ marginBottom: step.warns.length||step.qa.length ? 14 : 0 }}>
                    <div style={{ fontSize:11, fontWeight:"bold", color:"#64748b", marginBottom:8 }}>📋 手順</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {step.details.map((d,i) => (
                        <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                          <div style={{ width:22, height:22, borderRadius:"50%", flexShrink:0, background:step.phaseColor, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:"bold", marginTop:1 }}>{i+1}</div>
                          <div style={{ fontSize:13, color:"#374151", lineHeight:1.6, paddingTop:2, fontFamily: d.startsWith("Text.") || d.startsWith("{") ? "monospace" : "inherit" }}>{d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  {step.warns.length > 0 && (
                    <div style={{ background:"#fefce8", border:"1px solid #fde047", borderRadius:8, padding:"10px 14px", marginBottom: step.qa.length ? 12 : 0 }}>
                      <div style={{ fontSize:11, fontWeight:"bold", color:"#854d0e", marginBottom:6 }}>⚠️ つまずきやすいポイント</div>
                      {step.warns.map((w,i) => (
                        <div key={i} style={{ fontSize:12, color:"#713f12", marginBottom: i<step.warns.length-1?4:0 }}>• {w}</div>
                      ))}
                    </div>
                  )}
                  {step.qa.length > 0 && (
                    <div>
                      <div style={{ fontSize:11, fontWeight:"bold", color:"#64748b", marginBottom:8 }}>💬 よくある質問</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                        {step.qa.map((qa,i) => {
                          const key = step.id+"-"+i;
                          return (
                            <div key={i} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:8, overflow:"hidden" }}>
                              <div onClick={() => toggleQA(key)} style={{ padding:"9px 14px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
                                <span style={{ fontSize:12, fontWeight:"bold", color:"#374151" }}>Q. {qa.q}</span>
                                <span style={{ color:"#94a3b8", fontSize:12, display:"inline-block", transform: openQA[key]?"rotate(90deg)":"rotate(0deg)", transition:"transform 0.2s" }}>▶</span>
                              </div>
                              {openQA[key] && (
                                <div style={{ padding:"0 14px 12px", fontSize:12, color:"#475569", lineHeight:1.7, borderTop:"1px solid #f1f5f9" }}>
                                  <div style={{ paddingTop:10 }}>A. {qa.a}</div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CodeGenerator() {
  const { useState: useS } = React;

  // --- 型定義 ---
  const typeOptions = [
    { value:"text",     label:"テキスト", short:"abc", color:"#64748b", bg:"#f1f5f9", border:"#e2e8f0" },
    { value:"number",   label:"数値",     short:"123", color:"#0369a1", bg:"#eff6ff", border:"#bfdbfe" },
    { value:"date",     label:"日付",     short:"日付", color:"#b45309", bg:"#fff7ed", border:"#fed7aa" },
    { value:"datetime", label:"日時",     short:"日時", color:"#7c3aed", bg:"#f5f3ff", border:"#c4b5fd" },
    { value:"logical",  label:"論理値",   short:"○×", color:"#15803d", bg:"#f0fdf4", border:"#86efac" },
  ];

  // === 列名エスケープ関数（特殊文字・記号・スペース含む列名を自動で #"..." 形式に変換）===
  const col = (name) => {
    if (/^[A-Za-z_][A-Za-z0-9_]*$/.test(name)) return `[${name}]`;
    return `[#"${name}"]`;
  };

  // === 型→変換式 ===
  const colWithType = ({name, type}) => {
    const c = col(name);
    if (type === "number")   return `Text.From(${c})`;
    if (type === "date")     return `Date.ToText(${c}, "yyyy/MM/dd")`;
    if (type === "datetime") return `DateTime.ToText(${c}, "yyyy/MM/dd HH:mm")`;
    if (type === "logical")  return `if ${c} then "○" else "×"`;
    return c;
  };

  // --- 共通ユーティリティ ---
  const [copied, setCopied] = useS(null);
  const copy = (text, key) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(key);
      setTimeout(() => setCopied(null), 2000);
    });
  };

  const CopyBtn = ({ text, id, color="#b45309" }) => (
    <button onClick={() => copy(text, id)} style={{
      background: copied===id ? "#16a34a" : color,
      color:"#fff", border:"none", borderRadius:6, padding:"6px 14px",
      fontSize:11, fontWeight:"bold", cursor:"pointer", fontFamily:"inherit",
      transition:"background 0.2s", whiteSpace:"nowrap", flexShrink:0
    }}>
      {copied===id ? "✅ コピー済み" : "📋 コピー"}
    </button>
  );

  const CodeBox = ({ code, id, color }) => (
    <div style={{ position:"relative", marginTop:8 }}>
      <pre style={{
        background:"#1e293b", color:"#7dd3fc", borderRadius:8,
        padding:"12px 14px", fontSize:12, fontFamily:"monospace",
        lineHeight:1.7, overflowX:"auto", margin:0, whiteSpace:"pre-wrap", wordBreak:"break-all"
      }}>{code}</pre>
      <div style={{ position:"absolute", top:8, right:8 }}>
        <CopyBtn text={code} id={id} color={color||"#b45309"} />
      </div>
    </div>
  );

  // --- 共通スタイル ---
  const labelStyle = { fontSize:11, fontWeight:"bold", color:"#78350f", marginBottom:4, display:"block" };
  const inputStyle = { border:"1px solid #fed7aa", borderRadius:6, padding:"6px 10px", fontSize:13, fontFamily:"inherit", outline:"none", background:"#fff", width:"100%" };
  const tipStyle = { background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:8, padding:"8px 12px", fontSize:12, color:"#92400e", marginBottom:12 };
  const typeSelectStyle = { border:"1px solid #fed7aa", borderRadius:6, padding:"6px 8px", fontSize:12, fontFamily:"inherit", background:"#fff", color:"#92400e", cursor:"pointer", outline:"none" };

  // === 型付き列入力コンポーネント ===
  const TypedColInput = ({ cols, input, setInput, inputType, setInputType, onAdd, onRemove, onTypeChange }) => (
    <div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
        {cols.map((item, i) => {
          const t = typeOptions.find(o => o.value === item.type) || typeOptions[0];
          return (
            <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:4, background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:999, padding:"3px 6px 3px 10px", fontSize:12, color:"#92400e" }}>
              {col(item.name)}
              <select value={item.type} onChange={e => onTypeChange(i, e.target.value)}
                style={{ border:"none", background:t.bg, color:t.color, fontSize:10, fontWeight:"bold", borderRadius:6, padding:"1px 4px", cursor:"pointer", fontFamily:"inherit", outline:"none" }}>
                {typeOptions.map(o => <option key={o.value} value={o.value}>{o.short} {o.label}</option>)}
              </select>
              <button onClick={() => onRemove(i)} style={{ background:"none", border:"none", cursor:"pointer", color:"#ef4444", fontSize:14, lineHeight:1, padding:0, fontWeight:"bold" }}>×</button>
            </span>
          );
        })}
      </div>
      <div style={{ display:"flex", gap:6 }}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); onAdd(); }}}
          placeholder="列名を入力してEnter" style={{...inputStyle, flex:1}} />
        <select value={inputType} onChange={e=>setInputType(e.target.value)} style={typeSelectStyle}>
          {typeOptions.map(o => <option key={o.value} value={o.value}>{o.short} {o.label}</option>)}
        </select>
        <button onClick={onAdd} style={{ background:"#b45309", color:"#fff", border:"none", borderRadius:6, padding:"6px 14px", fontSize:12, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>追加</button>
      </div>
    </div>
  );

  // === パターン①：基本連結 ===
  const [p1Cols, setP1Cols] = useS([{name:"SheetName",type:"text"},{name:"No",type:"number"}]);
  const [p1Delim, setP1Delim] = useS("-");
  const [p1Input, setP1Input] = useS("");
  const [p1InputType, setP1InputType] = useS("text");
  const addP1Col = () => { if(p1Input.trim()) { setP1Cols([...p1Cols, {name:p1Input.trim(), type:p1InputType}]); setP1Input(""); }};
  const removeP1Col = (i) => setP1Cols(p1Cols.filter((_,idx)=>idx!==i));
  const changeP1Type = (i, t) => setP1Cols(p1Cols.map((c,idx)=>idx===i?{...c,type:t}:c));
  const genP1 = () => p1Cols.map(c => colWithType(c)).join(` & "${p1Delim}" & `);

  // === パターン②：ゼロ埋めID ===
  const [p2Prefix, setP2Prefix] = useS("SheetName");
  const [p2No, setP2No] = useS("No");
  const [p2Delim, setP2Delim] = useS("-");
  const [p2Pad, setP2Pad] = useS("3");
  const genP2 = () =>
    `${col(p2Prefix)} & "${p2Delim}" & Text.PadStart(Text.From(${col(p2No)}), ${p2Pad}, "0")`;

  // === パターン③：null安全連結 ===
  const [p3Cols, setP3Cols] = useS([{name:"大分類",type:"text"},{name:"小分類",type:"text"}]);
  const [p3Delim, setP3Delim] = useS(" / ");
  const [p3Input, setP3Input] = useS("");
  const [p3InputType, setP3InputType] = useS("text");
  const addP3Col = () => { if(p3Input.trim()) { setP3Cols([...p3Cols, {name:p3Input.trim(), type:p3InputType}]); setP3Input(""); }};
  const removeP3Col = (i) => setP3Cols(p3Cols.filter((_,idx)=>idx!==i));
  const changeP3Type = (i, t) => setP3Cols(p3Cols.map((c,idx)=>idx===i?{...c,type:t}:c));
  const genP3 = () => {
    const items = p3Cols.map(c=>`        ${colWithType(c)}`).join(",\n");
    return `Text.Combine(\n    List.RemoveNulls({\n${items}\n    }),\n    "${p3Delim}"\n)`;
  };

  // === パターン④：条件付き連結 ===
  const [p4Col1, setP4Col1] = useS("大分類");
  const [p4Col1Type, setP4Col1Type] = useS("text");
  const [p4Col2, setP4Col2] = useS("小分類");
  const [p4Col2Type, setP4Col2Type] = useS("text");
  const [p4Open, setP4Open] = useS("（");
  const [p4Close, setP4Close] = useS("）");
  const genP4 = () => {
    const c1 = colWithType({name:p4Col1, type:p4Col1Type});
    const c2 = colWithType({name:p4Col2, type:p4Col2Type});
    return `if ${col(p4Col2)} <> null then\n    ${c1} & "${p4Open}" & ${c2} & "${p4Close}"\nelse\n    ${c1}`;
  };

  // === パターン⑤：Copilot/AI入力用 ===
  const [p5Cols, setP5Cols] = useS([{name:"大分類",type:"text"},{name:"小分類",type:"text"},{name:"No",type:"number"},{name:"質問文",type:"text"}]);
  const [p5Delim, setP5Delim] = useS("｜");
  const [p5Input, setP5Input] = useS("");
  const [p5InputType, setP5InputType] = useS("text");
  const [p5UseNo, setP5UseNo] = useS(true);
  const [p5NoCol, setP5NoCol] = useS("No");
  const [p5NoPrefix, setP5NoPrefix] = useS("設問");
  const addP5Col = () => { if(p5Input.trim()) { setP5Cols([...p5Cols, {name:p5Input.trim(), type:p5InputType}]); setP5Input(""); }};
  const removeP5Col = (i) => setP5Cols(p5Cols.filter((_,idx)=>idx!==i));
  const changeP5Type = (i, t) => setP5Cols(p5Cols.map((c,idx)=>idx===i?{...c,type:t}:c));
  const genP5 = () => {
    const items = p5Cols.map((item) => {
      if(p5UseNo && item.name===p5NoCol) return `        "${p5NoPrefix}" & Text.From(${col(item.name)})`;
      return `        ${colWithType(item)}`;
    }).join(",\n");
    return `Text.Combine(\n    List.RemoveNulls({\n${items}\n    }),\n    "${p5Delim}"\n)`;
  };

  // === パターン⑥：改行区切り ===
  const [p6Cols, setP6Cols] = useS([{name:"大分類",type:"text"},{name:"小分類",type:"text"},{name:"質問文",type:"text"}]);
  const [p6Input, setP6Input] = useS("");
  const [p6InputType, setP6InputType] = useS("text");
  const addP6Col = () => { if(p6Input.trim()) { setP6Cols([...p6Cols, {name:p6Input.trim(), type:p6InputType}]); setP6Input(""); }};
  const removeP6Col = (i) => setP6Cols(p6Cols.filter((_,idx)=>idx!==i));
  const changeP6Type = (i, t) => setP6Cols(p6Cols.map((c,idx)=>idx===i?{...c,type:t}:c));
  const genP6 = () => {
    const items = p6Cols.map(c=>`        ${colWithType(c)}`).join(",\n");
    return `Text.Combine(\n    List.RemoveNulls({\n${items}\n    }),\n    "#(lf)"\n)`;
  };

  // === パターン⑦：カスタム関数定義 ===
  const [p7Name, setP7Name] = useS("fnCombineSafe");
  const genP7def = () =>
    `(cols as list, delimiter as text) as text =>\n    Text.Combine(\n        List.RemoveNulls(cols),\n        delimiter\n    )`;
  const [p7Cols, setP7Cols] = useS([{name:"大分類",type:"text"},{name:"小分類",type:"text"},{name:"No",type:"number"}]);

  const addP7Col = () => { if(p7Input.trim()) { setP7Cols([...p7Cols, {name:p7Input.trim(), type:p7InputType}]); setP7Input(""); }};
  const removeP7Col = (i) => setP7Cols(p7Cols.filter((_,idx)=>idx!==i));
  const changeP7Type = (i, t) => setP7Cols(p7Cols.map((c,idx)=>idx===i?{...c,type:t}:c));
  const genP7use = () => {
    const items = p7Cols.map(item => {
      if(p7UseNo && item.name===p7NoCol) return `Text.From(${col(item.name)})`;
      return colWithType(item);
    }).join(", ");
    return `${p7Name}({${items}}, "${p7Delim}")`;
  };

      bg:"linear-gradient(135deg,#4338ca 0%,#6366f1 100%)",
      label:"ROW EXPAND GUIDE", title:"行を増やす処理",
      sub:"デザイン数の値だけ行を複製する — null対処→リスト生成→展開",
      badges:[{label:"全4ステップ",icon:"📋"},{label:"null対処あり",icon:"🔧"},{label:"Q&A付き",icon:"💬"}],
    },
    sortfilter: {
      bg:"linear-gradient(135deg,#0369a1 0%,#0ea5e9 100%)",
      label:"SORT & FILTER GUIDE", title:"並べ替え・フィルター",
      sub:"列の並べ替え・絞り込み・カテゴリ内の種類を揃える",
      badges:[{label:"条件列を活用",icon:"🗂️"},{label:"注意事項あり",icon:"⚠️"},{label:"Q&A付き",icon:"💬"}],
    },
    text: {
      bg:"linear-gradient(135deg,#065f46 0%,#10b981 100%)",
      label:"TEXT PROCESS GUIDE", title:"テキスト加工",
      sub:"文字削除・抽出・データ型変換など列の整形処理",
      badges:[{label:"値の置換",icon:"✂️"},{label:"Text.Select活用",icon:"📝"},{label:"型変換",icon:"🔄"}],
    },
    master: {
      bg:"linear-gradient(135deg,#5b21b6 0%,#8b5cf6 100%)",
      label:"MASTER DATA GUIDE", title:"マスタ管理・突合",
      sub:"属性マスタ作成・正規化・マージで属性を自動紐づけ",
      badges:[{label:"表記ゆれ対応",icon:"🔡"},{label:"マージ活用",icon:"🔗"},{label:"Q&A付き",icon:"💬"}],
    },
    functions: {
      bg:"linear-gradient(135deg,#9d174d 0%,#db2777 100%)",
      label:"FUNCTION REFERENCE", title:"M言語 関数リファレンス",
      sub:"Microsoft公式ドキュメントに基づく関数一覧 — よく使う関数を厳選して業務例付きで解説",
      badges:[{label:"Text関数",icon:"📝"},{label:"Table関数",icon:"📋"},{label:"List関数",icon:"🔢"},{label:"Date関数",icon:"📅"}],
    },
    generator: {
      bg:"linear-gradient(135deg,#78350f 0%,#b45309 100%)",
      label:"CODE GENERATOR", title:"M式 コードジェネレーター",
      sub:"列名・区切り文字を入力するだけでそのままコピペできるMコードを自動生成",
      badges:[{label:"列結合",icon:"🔗"},{label:"ID生成",icon:"🔢"},{label:"null安全",icon:"🛡️"},{label:"カスタム関数",icon:"⚙️"}],
    },
  };

  const h = headerConfig[mainTab];

  return (
    <div style={{ fontFamily:"'Hiragino Sans','Yu Gothic','Meiryo',sans-serif", width:"100%", minHeight:"100vh", padding:16, background:"#f8fafc" }}>
      <div className="tabs-container" style={{ display:"flex", gap:4, marginBottom:0, overflow:"hidden" }}>
        {tabs.map(tab => {
          const isActive = mainTab === tab.key;
          return (
            <button key={tab.key} onClick={() => setMainTab(tab.key)} title={tab.label} style={{
              padding:"10px 0", border:"2px solid",
              borderColor: isActive ? tab.activeColor : "#e2e8f0",
              borderBottom: isActive ? "none" : "2px solid #e2e8f0",
              cursor:"pointer", fontFamily:"inherit", fontWeight:"bold",
              borderRadius:"10px 10px 0 0",
              background: isActive ? tab.activeColor : "#e2e8f0",
              color: isActive ? "#fff" : "#64748b",
              transition:"all 0.15s",
              position:"relative", zIndex: isActive ? 2 : 1,
              marginBottom: isActive ? "-2px" : 0,
              flex:"1 1 0", minWidth:0, overflow:"hidden", whiteSpace:"nowrap",
            }}>
              <span style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6, paddingLeft:8, paddingRight:8 }}>
                <span style={{ fontSize:15, flexShrink:0 }}>{tab.label.match(/^(\S+)/)[1]}</span>
                <span className="tab-label">{tab.label.replace(/^\S+\s*/,"")}</span>
              </span>
            </button>
          );
        })}
      </div>

      <div style={{ background:h.bg, borderRadius:"0 10px 10px 10px", padding:"20px 24px", marginBottom:16, color:"#fff", position:"relative", zIndex:1 }}>
        <div style={{ fontSize:11, opacity:0.6, marginBottom:4, letterSpacing:"0.1em" }}>{h.label}</div>
        <div style={{ fontSize:22, fontWeight:"bold", marginBottom:4 }}>{h.title}</div>
        <div style={{ fontSize:12, opacity:0.75 }}>{h.sub}</div>
        <div style={{ marginTop:12, display:"flex", flexWrap:"wrap", gap:8 }}>
          {h.badges.map(b => (
            <span key={b.label} style={{ background:"rgba(255,255,255,0.12)", borderRadius:20, padding:"4px 12px", fontSize:11 }}>{b.icon} {b.label}</span>
          ))}
        </div>
      </div>

      {mainTab==="intro"      && <IntroGuide setMainTab={setMainTab} />}
      {mainTab==="home"       && <StepList steps={homeSteps} />}
      {mainTab==="rowexpand"  && <StepList steps={rowExpandSteps} />}
      {mainTab==="sortfilter" && <StepList steps={sortFilterSteps} />}
      {mainTab==="text"       && <StepList steps={textSteps} />}
      {mainTab==="master"     && <StepList steps={masterSteps} />}
      {mainTab==="functions"  && <FunctionReference />}
      {mainTab==="generator"  && <CodeGenerator />}

      <div style={{ background:"linear-gradient(135deg,#0f172a,#1e293b)", borderRadius:12, padding:"16px 20px", color:"#fff", marginTop:16 }}>
        <div style={{ fontSize:13, fontWeight:"bold", marginBottom:10 }}>💡 Power Queryの設計原則</div>
        <div style={{ background:"rgba(255,255,255,0.08)", borderRadius:8, padding:"10px 14px", fontFamily:"monospace", fontSize:12, color:"#7dd3fc", marginBottom:8 }}>
          処理はステップで積み重ねる → クエリは使い回す → 属性はマスタで管理する
        </div>
        <div style={{ fontSize:11, color:"#94a3b8" }}>更新するときは「ホームタブ → 更新」だけでOK。クエリを再構築する必要はありません。</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
